<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <h2><a href="index.html" class="logo-link">MEÇ</a></h2>
    <nav>
      <a href="index.html#about">About</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#research">Research</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <main class="detail-page">
    <div class="detail-container">

      <a href="index.html#projects" class="back-link">← Back to Projects</a>

      <img id="projectImage" class="detail-image" src="" alt="Project Image" />

      <section class="detail-card">
        <h1 id="title"></h1>
        <p id="desc" class="detail-desc"></p>

        <div class="detail-buttons">
          <a id="demo" class="btn" target="_blank">Live Demo</a>
          <a id="drive" class="btn" target="_blank">Drive Link</a>
        </div>

        <hr />

        <h2>Highlights</h2>
        <ul id="highlights" class="detail-list"></ul>

        <hr />

        <h2>Technologies</h2>
        <div id="techTags" class="tags"></div>
      </section>

    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const project = params.get("project");

    const data = {
      ztna: {
        title: "ZTNA Security Platform",
        color: "#2563EB",
        soft: "#DCEBFF",
        desc: "This project is a network access control system developed based on Zero Trust principles. Unlike traditional security models that assume the internal network is trusted, Zero Trust requires verification of every user and every access request. Within this project, a secure access architecture was designed with a strong focus on authentication, authorization and protected backend communication.",
        image: "ztna.png",
        demo: "https://wbt-project.com/",
        drive: "https://drive.google.com/drive/u/0/folders/1oybOvUmxSDfLu-fk1miwkdrYUtnVj_67",
        highlights: [
          "Central identity management with Keycloak",
          "JWT-based secure session management",
          "Role-Based Access Control (RBAC) architecture",
          "Central authentication and Single Sign-On structure",
          "Secure API access control mechanism",
          "Microservice-based secure API architecture",
          "User authentication system",
          "Authorization layer and role-based access management",
          "Token-based secure access control"
        ],
        tech: [
          "Keycloak",
          "JWT",
          "RBAC",
          "Authentication",
          "Authorization",
          "SSO",
          "API Security",
          "Backend System",
          "Zero Trust"
        ]
      },

      finance: {
        title: "Finance Tracker",
        color: "#16A34A",
        soft: "#DCF6E7",
        desc: "This project is a personal finance and investment tracking application that enables users to monitor their income and expenses while also analyzing the performance of investment tools. The system was designed with a user-oriented approach and includes data-focused reporting and analysis screens for better financial awareness.",
        image: "finance.png",
        demo: "#",
        drive: "https://drive.google.com/drive/u/0/folders/1W6BsINzBa0S53d98Snp6pdedZ7eNA4nT",
        highlights: [
          "Income and expense tracking system",
          "Database design and structured data management",
          "Financial analysis and reporting screens",
          "User-oriented finance management interface",
          "Investment and budget monitoring approach"
        ],
        tech: [
          "Finance Management",
          "SQL",
          "Database Design",
          "Reporting",
          "Data Analysis",
          "UI/UX"
        ]
      },

      coffee: {
        title: "Coffee App",
        color: "#92400E",
        soft: "#FDF6EC",
        desc: "CoffeeApp is a mobile coffee ordering and management application that allows users to browse coffee and dessert products, place orders and review their order history. The application was developed with modern mobile interface principles and adopts a user experience focused design supported by Firebase services.",
        image: "coffee.png",
        demo: "#",
        drive: "https://drive.google.com/drive/u/0/folders/1x1rumdt4soJdZDIjXbeZjCs4x2iwKG5K",
        highlights: [
          "Firebase Authentication based login and registration system",
          "Firebase Realtime Database integration for data management",
          "Firebase Storage integration for image content",
          "Coffee and dessert product listing",
          "Product detail pages",
          "Order creation and order history display",
          "User profile management",
          "Modern mobile interface design focused on usability"
        ],
        tech: [
          "Android",
          "Java",
          "Firebase Authentication",
          "Firebase Realtime Database",
          "Firebase Storage",
          "Mobile UI/UX"
        ]
      },

      avatar: {
        title: "Interactive AI Avatar",
        color: "#7C3AED",
        soft: "#E8E0FF",
        desc: "In this project, an AI-powered interactive character was developed for story-based games. The system is capable of building dynamic interaction with the player and generating contextual responses using natural language processing techniques. The aim of the project is to combine intelligent interaction with immersive software experiences.",
        image: "avatar.png",
        demo: "#",
        drive: "https://drive.google.com/drive/u/0/folders/1TGqWx-TUM85WMUxYJkSZf0oygUJAeu55",
        highlights: [
          "Natural language processing based response system",
          "AI character behavior integrated into a story-based game logic",
          "Dynamic reactions according to player input",
          "Interactive companion design for immersive experiences",
          "AI integration for user-facing interaction systems"
        ],
        tech: [
          "Python",
          "AI Integration",
          "NLP",
          "Interactive Systems",
          "Game Interaction",
          "Emotional Interaction"
        ]
      }
    };

    const item = data[project];

    if (!item) {
      document.querySelector(".detail-container").innerHTML = `
        <section class="detail-card">
          <h1>Project not found</h1>
          <p>The project you requested does not exist.</p>
          <a href="index.html#projects" class="btn">Back to Projects</a>
        </section>
      `;
    } else {

      document.documentElement.style.setProperty(
      '--project-color',
      item.color
      );
      
      document.documentElement.style.setProperty(
      '--project-soft-color',
      item.soft
      );

      document.getElementById("title").innerText = item.title;
      document.getElementById("desc").innerText = item.desc;
      document.getElementById("projectImage").src = item.image;
      document.getElementById("projectImage").alt = item.title;
      const demoBtn = document.getElementById("demo");
      const driveBtn = document.getElementById("drive");

      if (item.demo && item.demo !== "#") {
        demoBtn.href = item.demo;
      } else {
        demoBtn.style.display = "none";
      }

      if (item.drive && item.drive !== "#") {
        driveBtn.href = item.drive;
      } else {
        driveBtn.style.display = "none";
      }

      const highlightsEl = document.getElementById("highlights");
      item.highlights.forEach(point => {
        const li = document.createElement("li");
        li.textContent = point;
        highlightsEl.appendChild(li);
      });

      const techTagsEl = document.getElementById("techTags");
      item.tech.forEach(tag => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = tag;
        techTagsEl.appendChild(span);
      });
    }
  </script>

</body>
</html>
