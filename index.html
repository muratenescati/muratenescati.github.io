<title>Murat Enes Çatı | Portfolio</title>

<style>

:root{
--bg:#0b0f14;
--text:#eef2ff;
--muted:#a7b0c3;
--line:rgba(255,255,255,.08);
--accent:#c7f34f;
--max:1100px;
--shadow:0 20px 70px rgba(0,0,0,.55);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui;
color:var(--text);
background:radial-gradient(1200px 700px at 20% 10%, rgba(124,92,255,.15), transparent 60%),var(--bg);
}

.container{
max-width:var(--max);
margin:auto;
padding:30px 20px;
}

a{
color:inherit;
text-decoration:none;
}

/* HERO */

.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-center{
text-align:center;
padding:60px 40px;
border-radius:20px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
box-shadow:var(--shadow);
}

/* AVATAR */

.avatar{
width:260px;
height:260px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:3px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.6);
transition:.3s;
}

.avatar:hover{
transform:scale(1.05);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
object-position:center 25%;
}

/* TEXT */

.hero h1{
margin-top:25px;
font-size:40px;
}

.subtitle{
color:var(--muted);
margin-top:8px;
}

/* SOCIAL */

.socials{
margin-top:25px;
display:flex;
gap:18px;
justify-content:center;
}

.socials a{
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}

.socials a:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(199,243,79,.7);
border-color:var(--accent);
}

.socials img{
width:26px;
}
 /* Skills */

.skills{
margin-top:25px;
display:flex;
gap:18px;
justify-content:center;
}

.skills a{
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}

.skills a:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(199,243,79,.7);
border-color:var(--accent);
}

.skills img{
width:26px;
}
/* PROJECT BUTTON */

.project-btn{
margin-top:35px;
display:inline-block;
padding:12px 26px;
border-radius:30px;
background:var(--accent);
color:#000;
font-weight:700;
transition:.2s;
}

.project-btn:hover{
transform:scale(1.05);
}

/* PROJECTS */

.section{
margin-top:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
border-radius:18px;
border:1px solid var(--line);
background:rgba(255,255,255,.03);
overflow:hidden;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--accent);
}

.cover{
height:180px;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
}

.meta{
padding:15px;
}

.meta h3{
margin:0 0 5px;
}

.meta p{
color:var(--muted);
font-size:14px;
}
/* YARISMALAR */
